<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-32x32.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <!-- Aquí tienes tu Manifest Físico -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0b1320" />
    <meta name="description" content="Nova Strat Consulting - Consultoría empresarial integral y estrategia." />
    <title>Nova Strat Consulting</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Aquí tienes el registro de tu Service Worker Físico -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registrado con éxito:', registration.scope);
            })
            .catch(err => {
              console.log('Error al registrar el SW:', err);
            });
        });
      }
    </script>
  </body>
</html>
