<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Servicio No Disponible - NovaStrat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --color-bg: #f8fafc;
      --color-text: #0f172a;
      --color-text-muted: #64748b;
      --color-primary: #1e365d;
      --color-accent: #d4af37;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--color-bg);
      color: var(--color-text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      padding: 1.5rem;
    }

    /* Background Orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      z-index: 1;
    }

    .orb-1 {
      width: 300px;
      height: 300px;
      background: rgba(212, 175, 55, 0.12); /* Gold */
      top: 15%;
      left: 15%;
      animation: floatOrb 18s infinite alternate ease-in-out;
    }

    .orb-2 {
      width: 350px;
      height: 350px;
      background: rgba(30, 54, 93, 0.08); /* Corporate Blue */
      bottom: 15%;
      right: 15%;
      animation: floatOrb 22s infinite alternate-reverse ease-in-out;
    }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -30px) scale(1.1); }
      100% { transform: translate(-20px, 20px) scale(0.9); }
    }

    /* Glassmorphic Card */
    .card {
      width: 100%;
      max-width: 480px;
      padding: 4rem 2.5rem;
      background: rgba(255, 255, 255, 0.75);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 1.5rem;
      box-shadow: 0 20px 40px rgba(15, 23, 42, 0.05);
      text-align: center;
      z-index: 5;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .icon-wrapper {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(30, 54, 93, 0.05);
      border: 1px solid rgba(30, 54, 93, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.5rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      fill: none;
      stroke: var(--color-primary);
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .title {
      font-family: 'Outfit', sans-serif;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--color-primary);
      margin-bottom: 1rem;
      letter-spacing: -0.02em;
    }

    .text {
      font-size: 0.95rem;
      color: var(--color-text-muted);
      line-height: 1.6;
      margin-bottom: 2.5rem;
      max-width: 360px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1rem 2.2rem;
      background-color: var(--color-primary);
      color: #ffffff;
      border: none;
      border-radius: 16px;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(30, 54, 93, 0.15);
    }

    .btn:hover {
      background-color: #2b4c7e;
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(30, 54, 93, 0.25);
    }

    .btn:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <!-- Background Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Card -->
  <div class="card">
    <div class="icon-wrapper">
      <!-- Lucide WifiOff Icon SVG -->
      <svg class="icon" viewBox="0 0 24 24">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.5"/>
        <path d="M5 12.5a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.58 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <path d="M12 20h.01"/>
      </svg>
    </div>
    <h1 class="title">Servicio Temporalmente No Disponible</h1>
    <p class="text">
      No hemos podido establecer conexión con nuestros servidores. Por favor, comprueba tu conexión a internet o vuelve a intentarlo en unos momentos.
    </p>
    <button class="btn" onclick="window.location.reload()">
      <!-- Refresh CW SVG -->
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.57-8.38l5.67-5.67"/>
      </svg>
      Reintentar Conexión
    </button>
  </div>
</body>
</html>
